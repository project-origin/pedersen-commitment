name: Verifies PR are ready for merge

on:
  pull_request:
    branches:
      - main

jobs:
  verify-devcontainer:
    uses: project-origin/.github/.github/workflows/reusable-verify-devcontainer.yaml@44f6bef1fe017d3c569ed3eb08b91fe6ad5968e3

  verify-code:
    uses: project-origin/.github/.github/workflows/reusable-verify-code.yaml@44f6bef1fe017d3c569ed3eb08b91fe6ad5968e3

  verify-renovate:
    uses: project-origin/.github/.github/workflows/reusable-verify-renovate.yaml@44f6bef1fe017d3c569ed3eb08b91fe6ad5968e3

  verify-build-nuget:
    uses: ./.github/workflows/reusable-build-nuget-package.yaml
    with:
      version: 0.0.1
      configuration: Release
