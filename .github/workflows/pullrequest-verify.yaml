name: Verifies PR are ready for merge

on:
  pull_request:
    branches:
      - main

jobs:
  verify-devcontainer:
    uses: project-origin/.github/.github/workflows/reusable-verify-devcontainer.yaml@73c7ca3a1464da66006a8116ebc3cd3323218e76

  verify-code:
    uses: project-origin/.github/.github/workflows/reusable-verify-code.yaml@73c7ca3a1464da66006a8116ebc3cd3323218e76

  verify-renovate:
    uses: project-origin/.github/.github/workflows/reusable-verify-renovate.yaml@73c7ca3a1464da66006a8116ebc3cd3323218e76

  verify-build-nuget:
    uses: ./.github/workflows/reusable-build-nuget-package.yaml
    with:
      version: 0.0.1
      configuration: Release
