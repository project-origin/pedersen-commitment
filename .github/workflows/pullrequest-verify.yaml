name: Verifies PR are ready for merge

on:
  pull_request:
    branches:
      - main

jobs:
  verify-devcontainer:
    uses: project-origin/.github/.github/workflows/reusable-verify-devcontainer.yaml@91f4e474126195cfbbfd6e590a28550acf3b53d8

  verify-code:
    uses: project-origin/.github/.github/workflows/reusable-verify-code.yaml@91f4e474126195cfbbfd6e590a28550acf3b53d8

  verify-renovate:
    uses: project-origin/.github/.github/workflows/reusable-verify-renovate.yaml@91f4e474126195cfbbfd6e590a28550acf3b53d8

  verify-build-nuget:
    uses: ./.github/workflows/reusable-build-nuget-package.yaml
    with:
      version: 0.0.1
      configuration: Release
