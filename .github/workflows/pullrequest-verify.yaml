name: Verifies PR are ready for merge

on:
  pull_request:
    branches:
      - main

jobs:
  verify-devcontainer:
    uses: project-origin/.github/.github/workflows/reusable-verify-devcontainer.yaml@e8bd94cc320224bb68c829937a63eea973c7007d

  verify-code:
    uses: project-origin/.github/.github/workflows/reusable-verify-code.yaml@e8bd94cc320224bb68c829937a63eea973c7007d

  verify-renovate:
    uses: project-origin/.github/.github/workflows/reusable-verify-renovate.yaml@e8bd94cc320224bb68c829937a63eea973c7007d

  verify-build-nuget:
    uses: ./.github/workflows/reusable-build-nuget-package.yaml
    with:
      version: 0.0.1
      configuration: Release
